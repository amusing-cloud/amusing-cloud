<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMUSING-CLOUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --fg: #ffffff;
    --fg-dim: rgba(255, 255, 255, 0.55);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: var(--bg);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(28px, 6vw, 44px);
    padding: 24px;
    opacity: 0;
    transform: translateY(12px);
    animation: reveal 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .logo {
    width: min(60vw, 340px);
    height: auto;
    display: block;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--fg-dim);
    font-weight: 500;
    font-size: clamp(12px, 2.4vw, 14px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }

  .status::before,
  .status::after {
    content: "";
    width: 28px;
    height: 1px;
    background: rgba(255, 255, 255, 0.25);
  }

  @keyframes reveal {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .stage {
      animation: none;
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>
